version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: atomos_proxy_1        # CHANGE_ME: must match "<id>_proxy_1"
      APP_PORT: 80
      PROXY_AUTH_WHITELIST: "/api/*"

  web:
    # CHANGE_ME: build from ./frontend and push to your own registry, e.g.
    #   docker build -t YOUR_DOCKERHUB_USER/atomos-ui:1.0.0 ./frontend
    #   docker push YOUR_DOCKERHUB_USER/atomos-ui:1.0.0
    image: YOUR_DOCKERHUB_USER/atomos-ui:1.0.0
    restart: on-failure
    stop_grace_period: 30s
    environment:
      - DOMAIN=$DEVICE_DOMAIN_NAME
      - PUBLIC_POOL_API_URL=
      - PUBLIC_POOL_STRATUM_URL=${DEVICE_DOMAIN_NAME}:2018

  server:
    # CHANGE_ME: build from ./backend and push to your own registry, e.g.
    #   docker build -t YOUR_DOCKERHUB_USER/atomos:1.0.0 ./backend
    #   docker push YOUR_DOCKERHUB_USER/atomos:1.0.0
    image: YOUR_DOCKERHUB_USER/atomos:1.0.0
    restart: on-failure
    stop_grace_period: 30s
    ports:
      - "2018:2018/tcp"
    volumes:
      - "${APP_DATA_DIR}/data/database:/public-pool/DB"
    environment:
      - NODE_ENV=production
      - BITCOIN_RPC_URL=http://${APP_BITCOIN_NODE_IP}
      - BITCOIN_RPC_USER=${APP_BITCOIN_RPC_USER}
      - BITCOIN_RPC_PASSWORD=${APP_BITCOIN_RPC_PASS}
      - BITCOIN_RPC_PORT=${APP_BITCOIN_RPC_PORT}
      - BITCOIN_RPC_TIMEOUT=10000
      - API_PORT=2019
      - STRATUM_PORT=2018
      - NETWORK=mainnet
      - API_SECURE=false
      - ENABLE_SOLO=true
      - ENABLE_PROXY=false
      - POOL_IDENTIFIER="Atomos Solo Mining"   # shown to miners in their pool config
      # --- new webhook notification feature ---
      - WEBHOOK_URL=                        # CHANGE_ME: Discord/Slack/ntfy.sh URL, leave blank to disable
      - WEBHOOK_FORMAT=discord               # discord | slack | ntfy | json

  proxy:
    image: nginx:1.25.3@sha256:4c0fdaa8b6341bfdeca5f18f7837462c80cff90527ee35ef185571e1c327beac
    volumes:
      - ${APP_DATA_DIR}/data/proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - server
    restart: on-failure

  widget-server:
    image: ghcr.io/getumbrel/umbrel-public-pool-widget:v1.0.0@sha256:b8861a5b79471377f1bfbf6733f11350970b482103d4ef4185f372350ffff6b3
    user: "1000:1000"
    environment:
      - PUBLIC_POOL_API_URL=http://atomos_proxy_1/api/pool   # CHANGE_ME: match APP_HOST above
    restart: on-failure
