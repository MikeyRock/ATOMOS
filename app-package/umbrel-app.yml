manifestVersion: 1
id: atomos                                   # CHANGE_ME: unique app id, lowercase-with-dashes
category: bitcoin
name: ATOMOS                                  # CHANGE_ME: your app's display name
version: "1.0.0"
tagline: My own branded solo Bitcoin mining pool
description: >-
  A self-hosted solo Bitcoin mining pool, forked from Public Pool
  (https://github.com/benjamin-wilson/public-pool), running against my
  own node with custom branding and webhook notifications on block found.
developer: CHANGE_ME (your name)
website: ""                                         # CHANGE_ME: optional project page
dependencies:
  - bitcoin
repo: https://github.com/CHANGE_ME/atomos     # CHANGE_ME: your fork's repo URL
support: https://github.com/CHANGE_ME/atomos/issues
port: 2019
gallery:
  - 1.jpg
  - 2.jpg
path: ""
releaseNotes: >-
  Initial release: forked from Public Pool with custom branding and
  generic webhook alerts (Discord/Slack/ntfy) on block found.
defaultPassword: ""
widgets:
  - id: "stats"
    type: "four-stats"
    refresh: "5s"
    endpoint: "widget-server:3000/widgets/pool"
    link: ""
    example:
      type: "four-stats"
      link: ""
      items:
        - title: "Hash Rate"
          text: "968"
          subtext: "GH/s"
        - title: "Miners"
          text: "1"
        - title: "Blocks Found"
          text: "1"
        - title: "Block Height"
          text: "883453"
submitter: CHANGE_ME
submission: ""
