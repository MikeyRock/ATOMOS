<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ATOMOS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="style.css">
  <script src="assets/chart.umd.js"></script>
  <script src="assets/runtime-config.js"></script>
</head>
<body>

  <div id="topbar" class="topbar">
    <a class="topbar-logo-wrap" href="/">
      <span class="topbar-logo">ATOMOS</span>
      <span class="topbar-subtitle">BTC Solo Mining</span>
      <span class="topbar-credit">Created by MikeyRocks</span>
    </a>
    <div class="topbar-actions">
      <button id="settings-btn" title="Settings">&#9881;</button>
    </div>
  </div>

  <div id="app-root"></div>

  <div id="block-found-overlay" class="block-found-overlay" style="display:none;">
    <canvas id="confetti-canvas" class="confetti-canvas"></canvas>
    <div class="block-found-text">&#9935; BTC BLOCK FOUND! &#9935;</div>
    <button id="block-found-clear" class="btn btn-outline">Clear Notification</button>
  </div>

  <div id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
