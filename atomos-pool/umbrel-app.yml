manifestVersion: 1
id: atomos-pool
category: bitcoin
name: ATOMOS
icon: https://raw.githubusercontent.com/MikeyRock/ATOMOS/main/atomos-pool/icon.svg
version: "3.3.0"
tagline: My own branded solo Bitcoin mining pool
description: >-
  A self-hosted solo Bitcoin mining pool. The mining/stratum backend is
  forked from Public Pool (https://github.com/benjamin-wilson/public-pool);
  the dashboard is a fully custom-built frontend, running against my own
  node with webhook notifications on block found.
developer: MikeyRocks
website: ""
dependencies:
  - bitcoin
repo: https://github.com/MikeyRock/ATOMOS
support: https://github.com/MikeyRock/ATOMOS/issues
port: 2019
gallery:
  - 1.jpg
  - 2.jpg
path: ""
releaseNotes: >-
  v3.0.0: complete frontend replacement. The old Angular/PrimeNG UI is
  gone entirely, replaced with a dependency-free HTML/CSS/JS dashboard -
  no framework, no build step, no leftover Public Pool UI code. One page,
  one dashboard, lands straight on it every time. The mining backend
  (stratum server, Bitcoin RPC, share validation) is unchanged.
defaultPassword: ""
widgets:
  - id: "stats"
    type: "four-stats"
    refresh: "5s"
    endpoint: "widget-server:3000/widgets/pool"
    link: ""
    example:
      type: "four-stats"
      link: ""
      items:
        - title: "Hash Rate"
          text: "968"
          subtext: "GH/s"
        - title: "Miners"
          text: "1"
        - title: "Blocks Found"
          text: "1"
        - title: "Block Height"
          text: "883453"
submitter: MikeyRocks
submission: ""
