manifestVersion: 1
id: atomos-pool
category: bitcoin
name: ATOMOS
icon: https://raw.githubusercontent.com/MikeyRock/ATOMOS/main/atomos-pool/icon.svg
version: "1.7.0"
tagline: My own branded solo Bitcoin mining pool
description: >-
  A self-hosted solo Bitcoin mining pool, forked from Public Pool
  (https://github.com/benjamin-wilson/public-pool), running against my
  own node with custom branding and webhook notifications on block found.
developer: MikeyRocks
website: ""
dependencies:
  - bitcoin
repo: https://github.com/MikeyRock/ATOMOS
support: https://github.com/MikeyRock/ATOMOS/issues
port: 2019
gallery:
  - 1.jpg
  - 2.jpg
path: ""
releaseNotes: >-
  v1.7.0: redesigned Discord alerts with the worker name included, proper
  K/M/G/T difficulty formatting, and rich colored embeds. Also includes the
  v1.2-1.3 dashboard redesign, live BTC price/halving tracking, the
  Settings dialog, and a full removal of leftover Public Pool branding.
defaultPassword: ""
widgets:
  - id: "stats"
    type: "four-stats"
    refresh: "5s"
    endpoint: "widget-server:3000/widgets/pool"
    link: ""
    example:
      type: "four-stats"
      link: ""
      items:
        - title: "Hash Rate"
          text: "968"
          subtext: "GH/s"
        - title: "Miners"
          text: "1"
        - title: "Blocks Found"
          text: "1"
        - title: "Block Height"
          text: "883453"
submitter: MikeyRocks
submission: ""
